<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Crachá</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
        }

        .container {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: flex-start;
        }

        .box {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 380px;
            box-shadow: 0 0 12px rgba(0,0,0,0.15);
        }

        .preview {
            background: white;
            padding: 20px;
            border-radius: 12px;
            width: 650px;
            min-height: 650px;
            box-shadow: 0 0 12px rgba(0,0,0,0.15);
            text-align: center;
        }

        h1, h2 {
            text-align: center;
        }

        input {
            margin: 8px 0;
            padding: 6px;
        }

        input[type="file"] {
            width: 95%;
        }

        input[type="range"] {
            width: 95%;
        }

        button {
            background: green;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
            width: 100%;
        }

        button:hover {
            background: darkgreen;
        }

        label {
            font-weight: bold;
        }

        .linha {
            margin-top: 15px;
        }

        #previewImg {
            max-width: 100%;
            border: 1px solid #ddd;
            background: white;
        }

        #status {
            color: gray;
            margin-top: 10px;
            text-align: center;
        }

        .valor {
            color: blue;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="box">
        <h1>Gerar Crachás</h1>

        <form id="formCracha" action="/gerar" method="post" enctype="multipart/form-data">

            <p><b>Planilha Excel:</b></p>
            <input type="file" name="excel" id="excel" accept=".xlsx" required>

            <p><b>PDF Modelo:</b></p>
            <input type="file" name="pdf" id="pdf" accept=".pdf" required>

            <div class="linha">
                <label>Posição X: <span id="valorX" class="valor">118</span></label><br>
                <input type="range" name="pos_x" id="pos_x" min="0" max="800" value="118">
            </div>

            <div class="linha">
                <label>Posição Y: <span id="valorY" class="valor">300</span></label><br>
                <input type="range" name="pos_y" id="pos_y" min="0" max="800" value="300">
            </div>

            <div class="linha">
                <label>Rotação: <span id="valorRotacao" class="valor">90</span></label><br>
                <input type="range" name="rotacao" id="rotacao" min="0" max="360" value="90">
            </div>

            <div class="linha">
                <label>Tamanho da fonte: <span id="valorFonte" class="valor">10</span></label><br>
                <input type="range" name="fonte" id="fonte" min="6" max="30" value="10">
            </div>

            <button type="submit">GERAR PDF FINAL</button>

        </form>

        <p id="status">Selecione a planilha e o PDF.</p>
    </div>

    <div class="preview">
        <h2>Pré-visualização automática</h2>
        <img id="previewImg" src="" alt="A pré-visualização aparecerá aqui">
    </div>

</div>

<script>
    const form = document.getElementById("formCracha");

    const excel = document.getElementById("excel");
    const pdf = document.getElementById("pdf");

    const posX = document.getElementById("pos_x");
    const posY = document.getElementById("pos_y");
    const rotacao = document.getElementById("rotacao");
    const fonte = document.getElementById("fonte");

    const valorX = document.getElementById("valorX");
    const valorY = document.getElementById("valorY");
    const valorRotacao = document.getElementById("valorRotacao");
    const valorFonte = document.getElementById("valorFonte");

    const statusTexto = document.getElementById("status");
    const previewImg = document.getElementById("previewImg");

    let timer = null;

    function atualizarValores() {
        valorX.innerText = posX.value;
        valorY.innerText = posY.value;
        valorRotacao.innerText = rotacao.value;
        valorFonte.innerText = fonte.value;
    }

    function agendarPreview() {
        atualizarValores();

        clearTimeout(timer);
        timer = setTimeout(gerarPreview, 500);
    }

    async function gerarPreview() {
        if (!excel.files.length || !pdf.files.length) {
            statusTexto.innerText = "Selecione a planilha e o PDF.";
            return;
        }

        statusTexto.innerText = "Atualizando pré-visualização...";

        const formData = new FormData();

        formData.append("excel", excel.files[0]);
        formData.append("pdf", pdf.files[0]);
        formData.append("pos_x", posX.value);
        formData.append("pos_y", posY.value);
        formData.append("rotacao", rotacao.value);
        formData.append("fonte", fonte.value);

        try {
            const resposta = await fetch("/preview", {
                method: "POST",
                body: formData
            });

            const dados = await resposta.json();

            if (dados.ok) {
                previewImg.src = dados.imagem;
                statusTexto.innerText =
                    `Atualizado | X: ${posX.value} | Y: ${posY.value} | Rotação: ${rotacao.value} | Fonte: ${fonte.value}`;
            } else {
                statusTexto.innerText = "Erro: " + dados.erro;
            }

        } catch (erro) {
            statusTexto.innerText = "Erro ao gerar preview.";
        }
    }

    excel.addEventListener("change", agendarPreview);
    pdf.addEventListener("change", agendarPreview);

    posX.addEventListener("input", agendarPreview);
    posY.addEventListener("input", agendarPreview);
    rotacao.addEventListener("input", agendarPreview);
    fonte.addEventListener("input", agendarPreview);

    atualizarValores();
</script>

</body>
</html>
